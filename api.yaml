openapi: "3.0.0"
info:
  version: 1.0.0
  title: Directoryish API
servers:
  - url: /rsdir
paths:
  /entries:
    get:
      summary: Returns all entries
      description: Returns all entries from the system that the user has access to.
      operationId: getEntries
      parameters:
        - name: q
          in: query
          description: keywords to filter by
          required: false
          style: form
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Entry list response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntriesResponse'
        '400':
          description: Bad request
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Access denied
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
    post:
      summary: Creates a new entry
      description: Creates a new entry
      operationId: addEntry
      requestBody:
        description: Entry to add
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Entry'
      responses:
        '201':
          description: Entry response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Id'
          links:
            GetEntryByID:
              operationId: getEntry
              parameters:
                key: 'id'
                value: '$response.body#/id'
            UpdateEntry:
              operationId: updateEntry
              parameters:
                key: 'id'
                value: '$response.body#/id'
        '400':
          description: Bad request
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Access denied
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
  /entries/{key}/{value}:
    get:
      summary: Returns a directory entry by ID or symbol
      operationId: getEntry
      parameters:
        - $ref: '#/components/parameters/entryLookupKey'
        - $ref: '#/components/parameters/entryLookupValue'
      responses:
        '200':
          description: Entry response
          content:
            application/json:
