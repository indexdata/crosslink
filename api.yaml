          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
    patch:
      summary: Update an entry
      description: Update an entry
      operationId: updateEntry
      parameters:
        - $ref: '#/components/parameters/entryLookupKey'
        - $ref: '#/components/parameters/entryLookupValue'
      requestBody:
        description: Updated fields
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntryPatch'
      responses:
        '204':
          description: entry updated
        '400':
          description: Bad request
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Access denied
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Not found
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
    delete:
      summary: Delete directory entry by ID
      operationId: deleteEntry
      parameters:
        - $ref: '#/components/parameters/entryLookupKey'
        - $ref: '#/components/parameters/entryLookupValue'
      responses:
        '204':
          description: entry deleted
        '400':
          description: Bad request
          content:
            text/plain:
