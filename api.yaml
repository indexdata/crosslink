          description: ID of Closure to delete
          required: true
          schema: 
            type: string
            format: uuid
      responses:
        '204':
          description: Closure deleted
        '400':
          description: Bad request
          content:
            text/plain:
              schema:
                type: string
        '401':
          description: Access denied
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
components:
  parameters:
    Offset:
      name: offset
      in: query
      description: Offset for pagination (first item is 0)
      schema:
        type: integer
        format: int32
        minimum: 0
    Limit:
      name: limit
      in: query
      description: Limit for pagination
      schema:
        type: integer
        format: int32
        minimum: 0
        maximum: 1000
        default: 10
    entryLookupKey:
      name: key
      in: path
      description: Key to look up entry, either 'id' or 'symbol'
      required: true
      schema:
        type: string
        enum: [by-id, by-symbol]
    entryLookupValue:
      name: value
      in: path
      description: Value of id or symbol to access entry by
      required: true
      schema:
        type: string

  schemas:
    NetworksResponse:
      type: object
      required:
        - about
        - items
      properties:
        about:
          $ref: '#/components/schemas/About'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Network'
    TiersResponse:
      type: object
      required:
        - about
        - items
      properties:
        about:
          $ref: '#/components/schemas/About'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Tier'
    EntriesResponse:
      type: object
      required:
        - about
        - items
      properties:
        about:
          $ref: '#/components/schemas/About'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Entry'
    ClosuresResponse:
      type: object
      required:
        - about
        - items
      properties:
        about:
          $ref: '#/components/schemas/About'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Closure'
    MembershipsResponse:
      type: object
      required:
        - about
        - items
      properties:
        about:
          $ref: '#/components/schemas/About'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Membership'
    NetworkMembershipsResponse:
      type: object
      required:
        - about
        - items
      properties:
        about:
          $ref: '#/components/schemas/About'
        items:
          type: array
          items:
            $ref: '#/components/schemas/NetworkMembership'
    TierMembershipsResponse:
      type: object
      required:
        - about
        - items
      properties:
        about:
          $ref: '#/components/schemas/About'
        items:
          type: array
          items:
            $ref: '#/components/schemas/TierMembership'
    About:
      type: object
      required:
        - count
      properties:
        count:
          type: integer
          format: int64
          description: Total number of items in the result
        nextLink:
          type: string
          description: Link to the next page of results
        prevLink:
          type: string
          description: Link to the previous page of results
    Id:
      required:
        - id
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique id
    Entry:
      type: object
      required:
        - id
        - name
      properties:
        id:
          readOnly: true
          type: string
          format: uuid
          description: Unique id
        name:
          type: string
          minLength: 1
        type:
          type: string
          enum:
          - Institution
          - Consortium
        parent:
          type: string
          format: uuid
        description:
          type: string
        organizationId:
          type: string
        contactName:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
        lmsLocationCode:
          type: string
        hrid:
          type: string
        timeZone:
          type: string
        symbols:
          type: array
          items:
            $ref: '#/components/schemas/Symbol'
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/Address'
        closures:
          type: array
          items:
            $ref: '#/components/schemas/Closure'
        endpoints:
          type: array
          items:
            $ref: '#/components/schemas/ServiceEndpoint'
        networks:
          readOnly: true
          type: array
          items:
            $ref: '#/components/schemas/Network'
        tiers:
          readOnly: true
          type: array
          items:
            $ref: '#/components/schemas/Tier'
        lmsConfig:
          description: Configuration for LMS (Library Management System) integration via NCIP protocol
          $ref: '#/components/schemas/LmsConfig'
    EntryPatch:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        type:
          type: string
          enum:
            - Institution
            - Consortium
          nullable: true
        parent:
          type: string
          format: uuid
          nullable: true
        description:
          type: string
          nullable: true
        organizationId:
          type: string
          nullable: true
        contactName:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phoneNumber:
          type: string
          nullable: true
        lmsLocationCode:
          type: string
          nullable: true
        hrid:
          type: string
          nullable: true
        timeZone:
          type: string
          nullable: true
        lmsConfig:
          allOf:
            - $ref: '#/components/schemas/LmsConfigPatch'
          nullable: true
        symbols:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/SymbolPatch'
        endpoints:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ServiceEndpointPatch'
        addresses:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/AddressPatch'
        closures:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ClosurePatch'

    LmsConfig:
      type: object
      required:
        - address
        - fromAgency
      properties:
        address:
          type: string
          description: Base URL of the LMS API
        fromAgency:
          type: string
          description: Agency code used when the entry is acting as the supplying agency
        fromAgencyAuthentication:
          type: string
          x-oapi-codegen-extra-tags:
            protected: "true"
          description: Authentication token or credentials for the fromAgency
        toAgency:
          type: string
          description: Agency code used when the entry is acting as the requesting agency
        lookupUserEnabled:
          type: boolean
          description: Whether user lookup is enabled
          default: true
        acceptItemEnabled:
          type: boolean
          description: Whether item acceptance is enabled
          default: true
        checkInItemEnabled:
          type: boolean
          description: Whether item check-in is enabled
          default: true
        checkOutItemEnabled:
          type: boolean
          description: Whether item check-out is enabled
          default: true
        itemLocation:
          type: string
          description: Location code to include in NCIP RequestItem messages
          default: ""
        requestItemRequestType:
          type: string
          description: For Request Item requests, the type of request to create
          default: Page
        requestItemRequestScopeType:
          type: string
          description: For Request Item requests, the scope type of request to create
          default: Item
        requestItemBibIdCode:
          type: string
          description: For Request Item requests, the code indicating how to interpret the bib id
          default: SYSNUMBER
        requestItemPickupLocationEnabled:
          type: boolean
          description: Whether to include a pickup location when making Request Item requests
          default: true
        requesterPickupLocation:
          type: string
          description: Pickup location code used when acting as requesting agency
          default: Main Library
        supplierPickupLocation:
          type: string
          description: Pickup location code used when acting as supplying agency
          default: ILL Office
        requesterPatronPattern:
          type: string
          description: "'{requesterSymbol}' occurrences are replaced with requesting agency ISIL"
          default: "INST-{requesterSymbol}"
    LmsConfigPatch:
      type: object
      properties:
        address:
          type: string
        fromAgency:
          type: string
        fromAgencyAuthentication:
          type: string
        toAgency:
          type: string
        lookupUserEnabled:
          type: boolean
        acceptItemEnabled:
          type: boolean
        checkInItemEnabled:
          type: boolean
        checkOutItemEnabled:
          type: boolean
        itemLocation:
          type: string
        requestItemRequestType:
          type: string
        requestItemRequestScopeType:
          type: string
        requestItemBibIdCode:
          type: string
        requestItemPickupLocationEnabled:
          type: boolean
        requesterPickupLocation:
          type: string
        supplierPickupLocation:
          type: string
        requesterPatronPattern:
          type: string

    SymbolProperties:
      required:
        - symbol
        - authority
      properties:
        symbol:
          type: string
          description: Uppercase string
        authority:
          type: string
          description: Uppercase string
    Symbol:
      allOf:
        - required:
          - id
          properties:
            id:
              readOnly: true
              type: string
              format: uuid
              description: Unique id
        - $ref: '#/components/schemas/SymbolProperties'
    SymbolPatch:
      allOf:
        - properties:
            id:
              type: string
              format: uuid
              description: Unique id
        - $ref: '#/components/schemas/SymbolProperties'

    ServiceEndpointProperties:
      type: object
      required:
        - name
        - type
        - address
      properties:
        name:
          type: string
        type:
          type: string
        address:
          type: string
    ServiceEndpoint:
      allOf:
        - required:
          - id
          properties:
            id:
              readOnly: true
              type: string
              format: uuid
              description: Unique id
        - $ref: '#/components/schemas/ServiceEndpointProperties'
    ServiceEndpointPatch:
      allOf:
        - properties:
            id:
              type: string
              format: uuid
              description: Unique id
        - $ref: '#/components/schemas/ServiceEndpointProperties'

    AddressComponent:
      type: object
      required:
        - seq
        - type
        - value
      properties:
        seq:
          type: integer
          format: int32
          description: Sequence number for ordering components
        type:
          type: string
          enum:
            - Thoroughfare
            - Locality
            - AdministrativeArea
            - PostalCode
            - CountryCode
            - Other
        value:
          type: string

    AddressProperties:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - Default
            - Shipping
            - Billing
            - Other
        addressComponents:
          type: array
          items:
            $ref: '#/components/schemas/AddressComponent'
    Address:
      allOf:
        - required:
          - id
          - entry
          properties:
            id:
              readOnly: true
              type: string
              format: uuid
              description: Unique id
            entry:
              readOnly: true
              type: string
              format: uuid
        - $ref: '#/components/schemas/AddressProperties'
    AddressPatch:
      allOf:
        - properties:
            id:
              type: string
              format: uuid
              description: Unique id
        - $ref: '#/components/schemas/AddressProperties'

    Closure:
      type: object
      required:
        - id
        - entry
        - startDate
        - endDate
        - reason
      properties:
        id:
          readOnly: true
          type: string
          format: uuid
          description: Unique identifier
        entry:
          type: string
          format: uuid
        startDate:
          type: string
          format: date
          description: ISO8601 date
        endDate:
          type: string
          format: date
          description: ISO8601 date
        reason:
          type: string
    ClosurePatch:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        startDate:
          type: string
          format: date
          description: ISO8601 date
        endDate:
          type: string
          format: date
          description: ISO8601 date
        reason:
          type: string

    Network:
      type: object
      required:
        - id
      properties:
        id:
          readOnly: true
          type: string
          format: uuid
          description: Unique identifier
        name:
          type: string

    Tier:
      type: object
      required:
        - id
      properties:
        id:
          readOnly: true
          type: string
          format: uuid
          description: Unique identifier
        name:
          type: string
    
    Membership:
      type: object
      required:
        - id
        - institution
      properties:
        id:
          readOnly: true
          type: string
          format: uuid
          description: Unique identifier
        institution:
          type: string
          format: uuid
          description: ID of institution
    
    NetworkMembership:
      type: object
      required:
        - id
        - membership
        - network
      properties:
        id:
          readOnly: true
          type: string
          format: uuid
          description: Unique identifier
        membership:
          type: string
          format: uuid
          description: ID of membership
        network:
          type: string
          format: uuid
          description: ID of membership

    TierMembership:
      type: object
      required:
        - id
        - membership
        - tier
      properties:
        id:
          readOnly: true
          type: string
          format: uuid
          description: Unique identifier
        membership:
          type: string
          format: uuid
          description: ID of membership
        tier:
          type: string
          format: uuid
          description: ID of membership

