# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: build-test

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - '**.go'
      - '**.xsd'
      - '**.html'
      - '**.sql'
      - '**/sqlc.yaml'
      - '**/Makefile'
      - '**/Dockerfile' #run this workflow first to ensure tests are passing
      - '**/chart/**' #trigger also when chart templates chnage to force republish
      - '.github/**' #trigger when pipeline changes
      - '**/go.mod' #trigger when dependencies change
      - '**/ModuleDescriptor-template.json' #trigger when module descriptor changes
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.go'
      - '**.xsd'
      - '**.html'
      - '**.sql'
      - '**/sqlc.yaml'
      - '**/Makefile'
      - '**/Dockerfile' #run this workflow first to ensure tests are passing
      - '**/chart/**' #trigger also when chart templates change to force republish
      - '.github/**' #trigger when pipeline changes
      - '**/go.mod' #trigger when dependencies change
      - '**/ModuleDescriptor-template.json' #trigger when module descriptor changes
  release:
    types: [published]

env:
  GO_VERSION: stable
  GOLANGCI_LINT_VERSION: latest
  SQLC_VERSION: '1.29.0'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        modules: [broker, illmock]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: xsltproc
        version: 1.0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}
        cache-dependency-path: |
          go.work.sum
          ${{ matrix.modules }}/go.sum

    - name : Ensure sqlc is installed
      uses: sqlc-dev/setup-sqlc@v4
      with:
        sqlc-version: ${{ env.SQLC_VERSION }}

    - name: Generate sources
      run: make generate

    - name: Lint module '${{ matrix.modules }}'
      uses: golangci/golangci-lint-action@v9
      with:
        version: ${{ env.GOLANGCI_LINT_VERSION }}
        working-directory: ${{ matrix.modules }}

    - name: Build
      run: make all
      working-directory: ${{ matrix.modules }}

    - name: Test
      run: make check
      working-directory: ${{ matrix.modules }}

    - name: Check test coverage
      uses: vladopajic/go-test-coverage@v2
      continue-on-error: true
      with:
        config: ${{ matrix.modules }}/.testcoverage.yaml
        profile: ${{ matrix.modules }}/coverage.out

    - name: Check vulnerabilities in '${{ matrix.modules }}'
      uses: golang/govulncheck-action@master
      with:
        go-version-input: ${{ env.GO_VERSION }}
        repo-checkout: false
        go-package: ./...
        work-dir: ${{ matrix.modules }}
        #setup go already restores the cache
        cache: false

  bruno:
    name: Bruno E2E
    needs: [build]
    if: ${{ needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: xsltproc
        version: 1.0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}
        cache-dependency-path: |
          go.work.sum
          broker/go.sum
          illmock/go.sum

    - name : Ensure sqlc is installed
      uses: sqlc-dev/setup-sqlc@v4
      with:
        sqlc-version: ${{ env.SQLC_VERSION }}

    - name: Generate sources
      run: make generate

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Start Crosslink stack
      run: docker compose -f bruno/docker-compose.yml up -d --build

    - name: Wait for broker readiness
      run: |
        for i in {1..60}; do
          if curl -sS -o /dev/null http://localhost:8080/broker; then
            exit 0
          fi
          sleep 2
        done
        echo "Broker did not become ready in time"
        docker compose -f bruno/docker-compose.yml ps
        docker compose -f bruno/docker-compose.yml logs --no-color broker postgres illmock
        exit 1

    - name: Run Bruno collection (headless)
      run: |
        npx --yes @usebruno/cli@latest run "bruno/crosslink" \
          --folder "PR Happy flow" \
          --env LocalDev \
          --env-var userPassword="dummy"

    - name: Print container logs on failure
      if: failure()
      run: docker compose -f bruno/docker-compose.yml logs --no-color

    - name: Stop Crosslink stack
      if: always()
      run: docker compose -f bruno/docker-compose.yml down -v --remove-orphans

  build-all:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    name: Check all builds succeeded
    needs: [build, bruno]
    steps:
      - run: |
          build_result="${{ needs.build.result }}"
          bruno_result="${{ needs.bruno.result }}"
          if [[ "$build_result" == "success" && ( "$bruno_result" == "success" || "$bruno_result" == "skipped" ) ]]; then
            exit 0
          else
            echo "build=$build_result bruno=$bruno_result"
            exit 1
          fi
