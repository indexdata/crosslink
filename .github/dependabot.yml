version: 2
updates:
  # Go workspace modules
  - package-ecosystem: gomod
    directories:
      - "/broker"
      - "/directory"
      - "/httpclient"
      - "/illmock"
      - "/iso18626"
      - "/marcxml"
      - "/ncip"
      - "/sru"
      - "/testutil"
      - "/zoom"
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "deps"
    groups:
      go-minor-patch:
        group-by: dependency-name
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "deps"

  # Docker broker
  - package-ecosystem: docker
    directory: "/broker"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "deps"

  # Docker illmock
  - package-ecosystem: docker
    directory: "/illmock"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "deps"
