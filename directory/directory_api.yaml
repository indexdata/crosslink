openapi: "3.0.0"
info:
  version: 1.0.0
  title: Directory entries API
paths:
  /directory/entries:
    get:
      summary: Returns all entries
      description: Returns all entries from the system that the user has access to.
      operationId: getEntries
      parameters:
        - name: cql
          in: query
          description: CQL query filter
          required: false
          schema:
            type: string
        - name: limit
          in: query
          description: maximum number of results to return
          required: false
          schema:
            type: integer
            format: int32
        - name: offset
          in: query
          description: offset of first entry
          required: false
          schema:
            type: integer
            format: int32
        - name: peer_url
          in: query
          description: override url in result
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Entry list response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntriesResponse'
              example:
                $ref: './examples/directory.json'
        '400':
          description: Request validation error
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string

# apiroadmap.yaml

components:
  schemas:
    EntriesResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Entry'
        resultInfo:
          $ref: '#/components/schemas/ResultInfo'
    ResultInfo:
      type: object
      properties:
        totalRecords:
          type: integer
        diagnostics:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
    Consortium:
      type: object
      required:
        - id
      properties:
        id:
          readOnly: true
          type: string
          format: uuid
          description: Unique identifier
        name:
          type: string
        entry:
          type: string
          format: uuid
    Tier:
      type: object
      required:
        - id
        - consortium
        - name
        - type
        - level
        - cost
      properties:
        id:
          readOnly: true
          type: string
          format: uuid
          description: Unique identifier
        consortium:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
        level:
          type: string
        cost:
          type: number
          format: double
    Network:
      type: object
      required:
        - id
        - name
      properties:
        id:
          readOnly: true
          type: string
          format: uuid
          description: Unique identifier
        consortium:
          type: string
          format: uuid
        name:
          type: string
        priority:
          type: integer
    Membership:
      type: object
      required:
        - consortium
        - entry
      properties:
        consortium:
          type: string
          format: uuid
        entry:
          type: string
          format: uuid
    MembershipTier:
      type: object
      required:
        - consortium
        - entry
      properties:
        membership:
          type: string
          format: uuid
        tier:
          type: string
          format: uuid
    MembershipNetwork:
      type: object
      required:
        - consortium
        - entry
      properties:
        membership:
          type: string
          format: uuid
        network:
          type: string
          format: uuid

    # Similar to existing domain
    Entry:
      type: object
      required:
        - id
        - name
      properties:
        id:
          readOnly: true
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
        parent:
          type: string
        description:
          type: string
        organizationId:
          type: string
        contactName:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
        lmsLocationCode:
          type: string
        hrid:
          type: string
        timeZone:
          type: string
        symbols:
          type: array
          items:
            $ref: '#/components/schemas/Symbol'
        lenderOfLastResort:
          type: array
          items:
            $ref: '#/components/schemas/Symbol'
        tenant:
          description: The tenant this entry belongs to, if applicable.
          type: string
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/Address'
        closures:
          type: array
          items:
            $ref: '#/components/schemas/Closure'
        endpoints:
          type: array
          items:
            $ref: '#/components/schemas/ServiceEndpoint'
        networks:
          readOnly: true
          type: array
          items:
            $ref: '#/components/schemas/Network'
        tiers:
          readOnly: true
          type: array
          items:
            $ref: '#/components/schemas/Tier'
        lmsConfig:
          description: Configuration for LMS (Library Management System) integration via NCIP protocol
          $ref: '#/components/schemas/LmsConfig'
        holdingsConfig:
          description: Configuration for holdings lookup (institutional or consortial).
          $ref: '#/components/schemas/HoldingsConfig'
        vendor:
          type: string
          description: ISO18626 vendor type
          enum:
            - Alma
            - ReShare
            - CrossLink
            - ILLiad
            - Unknown

    HoldingsConfig:
      type: object
      properties:
        sru:
          $ref: '#/components/schemas/SruConfig'
        zoom:
          $ref: '#/components/schemas/ZoomConfig'
        queryConfig:
          $ref: '#/components/schemas/QueryConfig'
        parserConfig:
          $ref: '#/components/schemas/ParserConfig'
      additionalProperties: false

    SruConfig:
      type: object
      required:
        - address
      properties:
        address:
          type: string
          description: SRU server address (for example, "http://sru.indexdata.com:8080/marc")
        recordSchema:
          type: string
          description: Record schema to use for parsing holdings records (for example, "marcxml")
      additionalProperties: false

    ZoomConfig:
      type: object
      required:
        - address
      properties:
        address:
          type: string
          description: Z39.50 server address and database (for example, "z3950.indexdata.com:210/marc")
        options:
          type: object
          additionalProperties:
            type: string
          description: ZOOM options for the Z39.50 connection where key is the option name and value is the option value.
            Some of the options are "preferredRecordSyntax" (for example, "usmarc") and "count" (for example, "10").
      additionalProperties: false

    QueryConfig:
      type: object
      properties:
        type:
          type: string
          enum: 
            - cql
            - pqf
          default: pqf
          description: whether mapping is CQL or PQF. Default is PQF.
        title:
          type: string
          description: PQF/CQL format string for title search. Default is "@attr 1=4 {term}"
        isbn:
          type: string
          description: PQF/CQL format string for ISBN search. Default is "@attr 1=7 {term}"
        issn:
          type: string
          description: PQF/CQL format string for ISSN search. Default is "@attr 1=8 {term}"
        identifier:
          type: string
          description: PQF/CQL format string for identifier search. Default is "@attr 1=12 {term}"
      additionalProperties: false

    ParserConfig:
      type: object
      properties:
        marc:
          $ref: '#/components/schemas/MarcParserConfig'
        opac:
          $ref: '#/components/schemas/OpacParserConfig'
        reservoir:
          type: object
          description: Configuration for Reservoir parser. Currently must be empty; no properties allowed.
          properties: {}
          additionalProperties: false
        marc21plus1:
          type: object
          description: Configuration for MARC-21plus-1 parser. Currently must be empty; no properties allowed.
          properties: {}
          additionalProperties: false
      additionalProperties: false

    MarcParserConfig:
      type: object
      properties:
        mainField:
          type: string
          description: MARC field to use as the main field for holdings parsing (for example, "852")
        locationSubField:
          type: string
          description: Subfield code to use for location (for example, "b")
        shelvingLocationSubField:
          type: string
          description: Subfield code to use for shelving location (for example, "c")
        itemIdSubField:
          type: string
          description: Subfield code to use for item id (for example, "p")
        restrictedSubField:
          type: string
          description: Subfield code to use for restricted status (for example, "k")
        callNumberSubField:
          type: string
          description: Subfield code to use for call number (for example, "h")
      additionalProperties: false

    OpacParserConfig:
      type: object
      description: |
        Configuration for OPAC parser. Currently must be empty; no properties allowed.
      properties: {}
      additionalProperties: false

    LmsConfig:
      required:
        - address
        - fromAgency
      properties:
        address:
          type: string
          description: Base URL of the LMS API
        fromAgency:
          type: string
          description: Agency code used when the entry is acting as the supplying agency
        fromAgencyAuthentication:
          type: string
          description: Authentication token or credentials for the fromAgency
        toAgency:
          type: string
          description: Agency code used when the entry is acting as the requesting agency
        lookupUserEnabled:
          type: boolean
          description: Whether user lookup is enabled
          default: true
        acceptItemEnabled:
          type: boolean
          description: Whether item acceptance is enabled
          default: true
        checkInItemEnabled:
          type: boolean
          description: Whether item check-in is enabled
          default: true
        checkOutItemEnabled:
          type: boolean
          description: Whether item check-out is enabled
          default: true
        itemLocation:
          type: string
          description: Location code to include in NCIP RequestItem messages (for example, as an item optional field)
          default: ""
        requestItemRequestType:
          type: string
          description: For Request Item requests, the type of request to create.
          default: Page
        requestItemRequestScopeType:
          type: string
          description: For Request Item requests, the scope type of request to create.
          default: Item
        requestItemBibIdCode:
          type: string
          description: For Request Item requests, the code indicating how to interpret the bib id
          default: SYSNUMBER
        requestItemPickupLocationEnabled:
          type: boolean
          description: Whether to include a pickup location when making Request Item requests
          default: true
        requesterPickupLocation:
          type: string
          description: The pickup location code to use when the entry is acting as the requesting agency
          default: Main Library
        supplierPickupLocation:
          type: string
          description: The pickup location code to use when the entry is acting as the supplying agency
          default: ILL Office
        requesterPatronPattern:
          type: string
          description: Occurrences of the {requesterSymbol} will be replaced with the ISIL code of the requesting agency
          default: INST-{requesterSymbol}
    Symbol:
      required:
        - id
        - symbol
        - authority
      properties:
        id:
          readOnly: true
          type: string
          format: uuid
        symbol:
          type: string
          description: Uppercase string
        authority:
          type: string
          description: Uppercase string
    Authority:
      required:
        - id
        - symbol
      properties:
        id:
          readOnly: true
          type: string
          format: uuid
          description: Unique id
        symbol:
          type: string
          description: Uppercase string
    ServiceEndpoint:
      type: object
      required:
        - id
        - entry
        - name
        - type
        - address
      properties:
        id:
          readOnly: true
          type: string
          format: uuid
          description: Unique identifier
        entry:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
        address:
          type: string
    Address:
      type: object
      required:
        - id
        - entry
        - type
      properties:
        id:
          readOnly: true
          type: string
          format: uuid
          description: Unique identifier
        entry:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - Default
            - Shipping
            - Billing
            - Other
        addressComponents:
          type: array
          items:
            $ref: '#/components/schemas/AddressComponent'
    AddressComponent:
      type: object
      required:
        - id
        - address
        - type
        - value
      properties:
        id:
          readOnly: true
          type: string
          format: uuid
          description: Unique identifier
        address:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - Thoroughfare
            - Locality
            - AdministrativeArea
            - PostalCode
            - CountryCode
            - Other
        value:
          type: string
    Closure:
      type: object
      required:
        - id
        - entry
      properties:
        id:
          readOnly: true
          type: string
          format: uuid
          description: Unique identifier
        entry:
          type: string
          format: uuid
        startDate:
          type: string
          description: ISO8601 date
        endDate:
          type: string
          description: ISO8601 date
        reason:
          type: string
