components:
  parameters:
    Offset:
      name: offset
      in: query
      description: Offset for pagination (first item is 0)
      schema:
        type: integer
        format: int32
        minimum: 0
    Limit:
      name: limit
      in: query
      description: Limit for pagination
      schema:
        type: integer
        format: int32
        minimum: 0
        maximum: 1000
        default: 10
    entryLookupKey:
      name: key
      in: path
      description: Key to look up entry, either 'id' or 'symbol'
      required: true
      schema:
        type: string
        enum: [by-id, by-symbol]
    entryLookupValue:
      name: value
      in: path
      description: Value of id or symbol to access entry by
      required: true
      schema:
        type: string

  schemas:
    NetworksResponse:
      type: object
      required:
        - about
        - items
      properties:
        about:
          $ref: '#/components/schemas/About'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Network'
    TiersResponse:
      type: object
      required:
        - about
        - items
      properties:
        about:
          $ref: '#/components/schemas/About'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Tier'
    EntriesResponse:
      type: object
      required:
        - about
        - items
      properties:
        about:
          $ref: '#/components/schemas/About'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Entry'
    ClosuresResponse:
      type: object
      required:
        - about
        - items
      properties:
        about:
          $ref: '#/components/schemas/About'
        items:
          type: array
          items:
            $ref: '#/components/schemas/Closure'
    EntryNetworksResponse:
      type: object
      required:
        - about
        - items
      properties:
        about:
          $ref: '#/components/schemas/About'
        items:
          type: array
          items:
            $ref: '#/components/schemas/EntryNetwork'
    EntryTiersResponse:
      type: object
      required:
        - about
        - items
      properties:
        about:
          $ref: '#/components/schemas/About'
        items:
          type: array
          items:
            $ref: '#/components/schemas/EntryTier'
    About:
      type: object
      required:
        - count
      properties:
        count:
          type: integer
          format: int64
          description: Total number of items in the result
        nextLink:
          type: string
          description: Link to the next page of results
        prevLink:
          type: string
          description: Link to the previous page of results
    Id:
      required:
        - id
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique id
    Entry:
      type: object
      required:
        - id
        - name
      properties:
        id:
          readOnly: true
          type: string
          format: uuid
          description: Unique id
        name:
          type: string
          minLength: 1
        type:
          type: string
          enum:
          - Institution
          - Consortium
          - Branch
        parent:
          type: string
          format: uuid
        description:
          type: string
        organizationId:
          type: string
        contactName:
          type: string
        fromEmail:
          type: string
        tenant:
          type: string
        vendor:
          x-go-type: EntryVendor
        phoneNumber:
          type: string
        lmsLocationCode:
          type: string
        lenderOfLastResort:
          type: array
          items:
            $ref: '#/components/schemas/Symbol'
        hrid:
          type: string
        timeZone:
          type: string
        duplicateCheckWindowHours:
          type: integer
          format: int32
          description: The number of hours to check for duplicate requests. If a request is submitted within this window, it will be considered a duplicate.
          minimum: 0
        symbols:
          type: array
          items:
            $ref: '#/components/schemas/Symbol'
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/Address'
        closures:
          type: array
          items:
            $ref: '#/components/schemas/Closure'
        endpoints:
          type: array
          items:
            $ref: '#/components/schemas/ServiceEndpoint'
        networks:
          readOnly: true
          type: array
          items:
            $ref: '#/components/schemas/Network'
        tiers:
          readOnly: true
          type: array
          items:
            $ref: '#/components/schemas/Tier'
        lmsConfig:
          description: Configuration for LMS (Library Management System) integration via NCIP protocol
          $ref: '#/components/schemas/LmsConfig'
        holdingsConfig:
          x-go-type: HoldingsConfig
    EntryPatch:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        type:
          type: string
          enum:
            - Institution
            - Consortium
            - Branch
          nullable: true
        parent:
          type: string
          format: uuid
          nullable: true
        description:
          type: string
          nullable: true
        organizationId:
          type: string
          nullable: true
        contactName:
          type: string
          nullable: true
        fromEmail:
          type: string
          nullable: true
        tenant:
          type: string
          nullable: true
        vendor:
          x-go-type: EntryVendor
          nullable: true
        phoneNumber:
          type: string
          nullable: true
        lmsLocationCode:
          type: string
          nullable: true
        lenderOfLastResort:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/Symbol'
        hrid:
          type: string
          nullable: true
        timeZone:
          type: string
          nullable: true
        duplicateCheckWindowHours:
          type: integer
          format: int32
          description: The number of hours to check for duplicate requests. If a request is submitted within this window, it will be considered a duplicate.
          minimum: 0
          nullable: true
        lmsConfig:
          allOf:
            - $ref: '#/components/schemas/LmsConfigPatch'
          nullable: true
        holdingsConfig:
          x-go-type: HoldingsConfig
          nullable: true
        symbols:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/SymbolPatch'
        endpoints:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ServiceEndpointPatch'
        addresses:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/AddressPatch'
        closures:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/ClosurePatch'

    LmsConfig:
      type: object
      required:
        - address
        - fromAgency
      properties:
        address:
          type: string
          description: Base URL of the LMS API
        fromAgency:
          type: string
          description: Agency code used when the entry is acting as the supplying agency
        fromAgencyAuthentication:
          type: string
          x-oapi-codegen-extra-tags:
            protected: "true"
          description: Authentication token or credentials for the fromAgency
        toAgency:
          type: string
          description: Agency code used when the entry is acting as the requesting agency
        lookupUserEnabled:
          type: boolean
          description: Whether user lookup is enabled
          default: true
        acceptItemEnabled:
          type: boolean
          description: Whether item acceptance is enabled
          default: true
        checkInItemEnabled:
          type: boolean
          description: Whether item check-in is enabled
          default: true
        checkOutItemEnabled:
          type: boolean
          description: Whether item check-out is enabled
          default: true
        itemLocation:
          type: string
          description: Location code to include in NCIP RequestItem messages
          default: ""
        requestItemRequestType:
          type: string
          description: For Request Item requests, the type of request to create
          default: Page
        requestItemRequestScopeType:
          type: string
          description: For Request Item requests, the scope type of request to create
          default: Item
        requestItemBibIdCode:
          type: string
          description: For Request Item requests, the code indicating how to interpret the bib id
          default: SYSNUMBER
        requestItemPickupLocationEnabled:
          type: boolean
          description: Whether to include a pickup location when making Request Item requests
          default: true
        requesterPickupLocation:
          type: string
          description: Pickup location code used when acting as requesting agency
          default: Main Library
        supplierPickupLocation:
          type: string
          description: Pickup location code used when acting as supplying agency
          default: ILL Office
        requesterPatronPattern:
          type: string
          description: "'{requesterSymbol}' occurrences are replaced with requesting agency ISIL"
          default: "INST-{requesterSymbol}"
    LmsConfigPatch:
      type: object
      properties:
        address:
          type: string
        fromAgency:
          type: string
        fromAgencyAuthentication:
          type: string
        toAgency:
          type: string
        lookupUserEnabled:
          type: boolean
        acceptItemEnabled:
          type: boolean
        checkInItemEnabled:
          type: boolean
        checkOutItemEnabled:
          type: boolean
        itemLocation:
          type: string
        requestItemRequestType:
          type: string
        requestItemRequestScopeType:
          type: string
        requestItemBibIdCode:
          type: string
        requestItemPickupLocationEnabled:
          type: boolean
        requesterPickupLocation:
          type: string
        supplierPickupLocation:
          type: string
        requesterPatronPattern:
          type: string

    SymbolProperties:
      required:
        - symbol
        - authority
      properties:
        symbol:
          type: string
          description: Uppercase string
        authority:
          type: string
          description: Uppercase string
    Symbol:
      allOf:
        - required:
          - id
          properties:
            id:
              readOnly: true
              type: string
              format: uuid
              description: Unique id
        - $ref: '#/components/schemas/SymbolProperties'
    SymbolPatch:
      allOf:
        - properties:
            id:
              type: string
              format: uuid
              description: Unique id
        - $ref: '#/components/schemas/SymbolProperties'

    ServiceEndpointProperties:
      type: object
      required:
        - name
        - type
        - address
      properties:
        name:
          type: string
        type:
          type: string
        address:
          type: string
    ServiceEndpoint:
      allOf:
        - required:
          - id
          properties:
            id:
              readOnly: true
              type: string
              format: uuid
              description: Unique id
        - $ref: '#/components/schemas/ServiceEndpointProperties'
    ServiceEndpointPatch:
      allOf:
        - properties:
            id:
              type: string
              format: uuid
              description: Unique id
        - $ref: '#/components/schemas/ServiceEndpointProperties'

    AddressComponent:
      type: object
      required:
        - seq
        - type
        - value
      properties:
        seq:
          type: integer
          format: int32
          description: Sequence number for ordering components
        type:
          type: string
          enum:
            - Thoroughfare
            - Locality
            - AdministrativeArea
            - PostalCode
            - CountryCode
            - Other
        value:
          type: string

    AddressProperties:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - Default
            - Shipping
            - Billing
            - Other
        addressComponents:
          type: array
          items:
            $ref: '#/components/schemas/AddressComponent'
    Address:
      allOf:
        - required:
          - id
          - entry
          properties:
            id:
              readOnly: true
              type: string
              format: uuid
              description: Unique id
            entry:
              readOnly: true
              type: string
              format: uuid
        - $ref: '#/components/schemas/AddressProperties'
    AddressPatch:
      allOf:
        - properties:
            id:
              type: string
              format: uuid
              description: Unique id
        - $ref: '#/components/schemas/AddressProperties'

    Closure:
      type: object
      required:
        - id
        - entry
        - startDate
        - endDate
        - reason
      properties:
        id:
          readOnly: true
          type: string
          format: uuid
          description: Unique identifier
        entry:
          type: string
          format: uuid
        startDate:
          type: string
          format: date
          description: ISO8601 date
        endDate:
          type: string
          format: date
          description: ISO8601 date
        reason:
          type: string
    ClosurePatch:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
        startDate:
          type: string
          format: date
          description: ISO8601 date
        endDate:
          type: string
          format: date
          description: ISO8601 date
        reason:
          type: string

    Network:
      type: object
      required:
        - id
        - consortium
        - priority
      properties:
        id:
          readOnly: true
          type: string
          format: uuid
          description: Unique identifier
        consortium:
          type: string
          format: uuid
        name:
          type: string
        priority:
          type: number
          format: double
          default: 0.0
        reciprocal:
          type: boolean

    Tier:
      type: object
      required:
        - id
        - consortium
        - level
        - type
        - cost
      properties:
        id:
          readOnly: true
          type: string
          format: uuid
          description: Unique identifier
        consortium:
          type: string
          format: uuid
        name:
          type: string
        level:
          type: string
          enum:
            - express
            - normal
            - rush
            - secondarymail
            - standard
            - urgent
          default: standard
        type:
          type: string
          enum:
            - loan
            - copy
          default: loan
        cost:
          type: number
          format: double
          default: 0.0
    
    EntryNetwork:
      type: object
      required:
        - id
        - entry
        - network
      properties:
        id:
          readOnly: true
          type: string
          format: uuid
          description: Unique identifier
        entry:
          type: string
          format: uuid
          description: ID of entry
        network:
          type: string
          format: uuid
          description: ID of network

    EntryTier:
      type: object
      required:
        - id
        - entry
        - tier
      properties:
        id:
          readOnly: true
          type: string
          format: uuid
          description: Unique identifier
        entry:
          type: string
          format: uuid
          description: ID of entry
        tier:
          type: string
          format: uuid
          description: ID of tier
    
    AddEntryTier:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier

    AddEntryNetwork:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier
